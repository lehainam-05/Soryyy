<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đừng giận anh nữa nhé em?</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { min-height: 100vh; background: #fadadd; font-family: 'Nunito', sans-serif; overflow-x: hidden; }

  .page {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem 1.5rem; text-align: center;
  }

  .hint { font-size: 13px; color: #b07080; margin-bottom: 16px; font-style: italic; }

  h1 {
    font-family: 'Pacifico', cursive;
    font-size: clamp(26px, 7vw, 38px);
    color: #cc1a3a; line-height: 1.35; margin-bottom: 20px;
  }

  .cat-wrap {
    width: 220px; height: 185px;
    margin: 0 auto 28px;
    animation: wobble 2.2s ease-in-out infinite;
    background: #fadadd;
  }
  .cat-wrap img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
    mix-blend-mode: multiply;
  }
  @keyframes wobble {
    0%,100% { transform: rotate(-2deg) translateY(0); }
    50%      { transform: rotate(2deg) translateY(-7px); }
  }

  .btn-row {
    display: flex; gap: 20px;
    justify-content: center; align-items: center;
    min-height: 72px; position: relative;
  }

  .btn-yes {
    background: #d42b2b; color: #fff;
    border: none; border-radius: 50px;
    padding: 13px 38px; font-size: 17px; font-weight: 700;
    font-family: 'Nunito', sans-serif; cursor: pointer;
    box-shadow: 0 4px 0 #9e1a1a;
    --yesScale: 1;
    --yesLift: 0px;
    transform: translateY(var(--yesLift)) scale(var(--yesScale));
    transform-origin: center;
    transition: transform 0.12s ease;
  }
  .btn-yes:hover  { --yesLift: -2px; }
  .btn-yes:active { --yesLift: 2px; box-shadow: 0 1px 0 #9e1a1a; }

  .btn-no {
    background: #2e7d32; color: #fff;
    border: none; border-radius: 50px;
    padding: 13px 30px; font-size: 16px; font-weight: 700;
    font-family: 'Nunito', sans-serif; cursor: pointer;
    position: relative; white-space: nowrap;
    box-shadow: 0 4px 0 #1b5e20;
    transition: left 0.16s ease, top 0.16s ease;
    will-change: left, top;
    z-index: 2;
  }

  #happyPage { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; gap: 14px; }
  #happyPage .party {
    width: 200px;
    height: 200px;
    object-fit: contain;
    animation: popIn 0.5s cubic-bezier(.16,1,.3,1);
    mix-blend-mode: multiply;
  }
  @keyframes popIn { from { transform: scale(0) rotate(-15deg); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  #happyPage h2 { font-family: 'Pacifico', cursive; font-size: 30px; color: #cc1a3a; }
  #happyPage p  { font-size: 16px; color: #b07080; line-height: 1.9; }

  .rain { position: fixed; inset: 0; pointer-events: none; z-index: 99; overflow: hidden; }
  .ri { position: absolute; animation: rfall linear forwards; opacity: 0; }
  @keyframes rfall {
    0%   { transform: translateY(-30px); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.8; }
    100% { transform: translateY(110vh); opacity: 0; }
  }

  @media (max-width: 600px) {
    .page {
      padding: 1.5rem 1rem;
    }

    .hint {
      font-size: 12px;
      margin-bottom: 12px;
    }

    h1 {
      font-size: clamp(24px, 10vw, 34px);
      margin-bottom: 16px;
    }

    .cat-wrap {
      width: min(72vw, 220px);
      height: auto;
      aspect-ratio: 220 / 185;
      margin-bottom: 20px;
    }

    .btn-row {
      width: 100%;
      gap: 12px;
      min-height: 64px;
      flex-wrap: wrap;
    }

    .btn-yes,
    .btn-no {
      font-size: 15px;
      padding: 12px 26px;
    }

    #happyPage {
      padding: 1.5rem 1rem;
      gap: 12px;
    }

    #happyPage .party {
      width: 68vw;
      max-width: 220px;
      height: auto;
      aspect-ratio: 1 / 1;
    }

    #happyPage h2 {
      font-size: 24px;
    }

    #happyPage p {
      font-size: 15px;
      line-height: 1.7;
    }
  }
</style>
</head>
<body>

<div class="rain" id="rain"></div>

<div class="page" id="mainPage">
  <p class="hint">Em mà thoát ra hoặc ko chọn là coi như đồng ý nhé =))</p>

  <h1>Đừng giận anh<br>nữa nhé?</h1>

  <div class="cat-wrap">
    <img src="Capoo%20Bugcat%20Sticker%20-%20Capoo%20Bugcat%20Cry%20-%20Discover%20&%20Share%20GIFs.gif" alt="Capoo crying gif">
  </div>

  <div class="btn-row" id="btnRow">
    <button class="btn-yes" id="btnYes" onclick="sayYes()">Vâng</button>
    <button class="btn-no"  id="btnNo"  onmouseenter="runAway()" onpointerdown="runAway()">Không</button>
  </div>
</div>

<div id="happyPage">
  <img class="party" src="kiss.gif" alt="Kiss gif">
  <h2>Yêu em lắm lắm!!!!</h2>
  <p>Cảm ơn em đã tha thứ cho anh 💕<br>Anh hứa sẽ không làm em buồn nữa!</p>
  <audio id="happyMusic" src="music.mp3" preload="auto"></audio>
</div>

<script>
  const hs = ['💕','💗','💓','🌸','💝','💞','✨'];
  const rainEl = document.getElementById('rain');

  function spawnHeart(){
    const h = document.createElement('span');
    h.className = 'ri';
    h.textContent = hs[Math.floor(Math.random() * hs.length)];
    h.style.left = (Math.random() * 95) + 'vw';
    h.style.top = '-28px';
    const d = 2.8 + Math.random() * 2.5;
    h.style.animationDuration = d + 's';
    h.style.fontSize = (13 + Math.random() * 14) + 'px';
    rainEl.appendChild(h);
    setTimeout(() => h.remove(), d * 1000 + 300);
  }
  setInterval(spawnHeart, 1600);

  let noCount = 0;
  const btnYes = document.getElementById('btnYes');
  const btnNo  = document.getElementById('btnNo');
  let yesGrowCount = 0;

  function growYes(){
    yesGrowCount++;
    const scale = Math.min(1 + yesGrowCount * 0.12, 2.2);
    btnYes.style.setProperty('--yesScale', String(scale));
  }

  function runAway(){
    noCount++;
    growYes();
    if (btnNo.style.position !== 'fixed') {
      const rect = btnNo.getBoundingClientRect();
      btnNo.style.position = 'fixed';
      btnNo.style.left = rect.left + 'px';
      btnNo.style.top = rect.top + 'px';
      btnNo.style.margin = '0';
    }
    const maxX = Math.max(window.innerWidth - btnNo.offsetWidth - 16, 16);
    const maxY = Math.max(window.innerHeight - btnNo.offsetHeight - 16, 16);
    const x = 8 + Math.random() * maxX;
    const y = 8 + Math.random() * maxY;
    btnNo.style.left = x + 'px';
    btnNo.style.top  = y + 'px';
  }

  function sayYes(){
    document.getElementById('mainPage').style.display = 'none';
    document.getElementById('happyPage').style.display = 'flex';
    const happyMusic = document.getElementById('happyMusic');
    happyMusic.currentTime = 0;
    happyMusic.play().catch(() => {});
    for(let i = 0; i < 18; i++) setTimeout(spawnHeart, i * 90);
  }
</script>
</body>
</html>
